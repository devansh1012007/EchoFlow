#version: '3.8'

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: echoflow_db
    restart: always
    environment:
      POSTGRES_DB: echoflow_db
      POSTGRES_USER: devansh
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  redis:
    image: redis:7-alpine
    container_name: echoflow_redis
    restart: always
    ports:
      - "6379:6379"
  # until pg_isready -h db -U devansh; do sleep 1; done && --> cmd for waiting for db to be ready before running migrations and starting server
  web:
    build: .
    container_name: echoflow_web
    working_dir: /app
    command: >
      sh -c "python wait_for_db.py &&
         python manage.py migrate &&
         python manage.py collectstatic --noinput &&
         gunicorn EchoFlow.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"
    volumes:
      - .:/app
      - media_data:/app/media # Shared volume for audio segments
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgres://devansh:password@db:5432/echoflow_db
      - REDIS_URL=redis://redis:6379/1
      #- SECRET_KEY="django-insecure-637(8wp&#7+g)u&10xs!=2dwutofwh1my9la12$ogu9lm$^3ye"
    depends_on:
      - db
      - redis

  # 4. The Background Worker: Celery for HLS and AI processing
  celery:
    build: .
    container_name: echoflow_worker
    working_dir: /app
    user: "1000:1000" # Run as non-root to avoid permission issues with shared volumes
    command: >
      sh -c "sleep 10 && 
             celery -A EchoFlow worker --loglevel=info"
    volumes:
      - .:/app
      - media_data:/app/media # Shared volume to write HLS segments
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://devansh:password@db:5432/echoflow_db
      - REDIS_URL=redis://redis:6379/1
  
  celery_feed:
    build: .
    command: celery -A EchoFlow worker -Q fast_feed --concurrency=4 --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://devansh:password@db:5432/echoflow_db
      - REDIS_URL=redis://redis:6379/1

  celery_media:
    build: .
    command: celery -A EchoFlow worker -Q heavy_media --concurrency=2 --loglevel=info
    volumes:
      - media_data:/app/media
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://devansh:password@db:5432/echoflow_db
      - REDIS_URL=redis://redis:6379/1
      #- OPENAI_API_KEY=${OPENAI_API_KEY} # Must be passed for tasks
  
  celery_beat:
    build: .
    command: >
      sh -c "python wait_for_db.py &&
           sleep 15 &&
           celery -A EchoFlow beat --loglevel=info
           --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://devansh:password@db:5432/echoflow_db
      - REDIS_URL=redis://redis:6379/1

# Define persistent storage
volumes:
  postgres_data:
  media_data:
  huggingface_cache: